<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Stack - Enterprise Cloud Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white">
  <nav class="bg-slate-800 p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold"><i class="fas fa-cloud mr-2"></i>CloudStack</h1>
      <div class="space-x-4">
        <a href="#" class="hover:text-slate-300">Dashboard</a>
        <a href="#" class="hover:text-slate-300">Zones</a>
        <a href="#" class="hover:text-slate-300">Networks</a>
        <a href="#" class="hover:text-slate-300">Instances</a>
      </div>
    </div>
  </nav>
  
  <div class="container mx-auto p-6">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-slate-800 p-4 rounded">
        <p class="text-slate-400">Total Zones</p>
        <p class="text-2xl font-bold">4</p>
      </div>
      <div class="bg-slate-800 p-4 rounded">
        <p class="text-slate-400">Active Instances</p>
        <p class="text-2xl font-bold">128</p>
      </div>
      <div class="bg-slate-800 p-4 rounded">
        <p class="text-slate-400">Storage Used</p>
        <p class="text-2xl font-bold">2.4 PB</p>
      </div>
      <div class="bg-slate-800 p-4 rounded">
        <p class="text-slate-400">Networks</p>
        <p class="text-2xl font-bold">16</p>
      </div>
    </div>
    
    <div class="bg-slate-800 rounded-lg">
      <div class="p-4 border-b border-slate-700">
        <h2 class="text-lg font-semibold">Active Instances</h2>
      </div>
      <div class="p-4">
        <table class="w-full">
          <thead>
            <tr class="text-left text-slate-400">
              <th class="pb-3">Name</th>
              <th class="pb-3">Zone</th>
              <th class="pb-3">CPU</th>
              <th class="pb-3">Memory</th>
              <th class="pb-3">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-t border-slate-700">
              <td class="py-3">web-01</td>
              <td class="py-3">zone-us-east</td>
              <td class="py-3">8 vCPU</td>
              <td class="py-3">16 GB</td>
              <td class="py-3"><span class="bg-green-600 px-2 py-1 rounded text-sm">Running</span></td>
            </tr>
            <tr class="border-t border-slate-700">
              <td class="py-3">api-01</td>
              <td class="py-3">zone-us-west</td>
              <td class="py-3">4 vCPU</td>
              <td class="py-3">8 GB</td>
              <td class="py-3"><span class="bg-green-600 px-2 py-1 rounded text-sm">Running</span></td>
            </tr>
            <tr class="border-t border-slate-700">
              <td class="py-3">db-01</td>
              <td class="py-3">zone-eu</td>
              <td class="py-3">16 vCPU</td>
              <td class="py-3">64 GB</td>
              <td class="py-3"><span class="bg-green-600 px-2 py-1 rounded text-sm">Running</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
